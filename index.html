function pgRk(){var h=tp2('Risk Management')+'<div class="ct"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px"><div class="cd" style="border-left:4px solid var(--dg);text-align:center"><div style="font-size:26px;font-weight:900;color:var(--dg)">'+A.rk.filter(function(r){return r.d==='High'}).length+'</div><div style="font-size:11px;color:var(--tm);font-weight:600">High Risk</div></div><div class="cd" style="border-left:4px solid var(--wn);text-align:center"><div style="font-size:26px;font-weight:900;color:var(--wn)">'+A.rk.filter(function(r){return r.d==='Medium'}).length+'</div><div style="font-size:11px;color:var(--tm);font-weight:600">Medium Risk</div></div><div class="cd" style="border-left:4px solid var(--in);text-align:center"><div style="font-size:26px;font-weight:900;color:var(--in)">'+A.rk.filter(function(r){return r.d==='Low'}).length+'</div><div style="font-size:11px;color:var(--tm);font-weight:600">Low Risk</div></div></div><div class="cd ani" style="overflow-x:auto"><table class="tb2"><thead><tr><th>Risiko</th><th>Dampak</th><th>Mitigasi</th></tr></thead><tbody>';for(var i=0;i<A.rk.length;i++){var r=A.rk[i];h+='<tr><td style="font-weight:600">'+r.r+'</td><td>'+lb(r.d)+'</td><td style="max-width:280px;color:var(--ts)">'+r.m+'</td></tr>';}h+='</tbody></table></div></div>';return h;}

// === REQUIREMENT ===
function pgDkReq(){var fr=[{id:'FR-01',n:'Login',d:'Autentikasi pengguna dengan username dan password'},{id:'FR-02',n:'Dashboard',d:'Menampilkan ringkasan KPI dan grafik kinerja OPD'},{id:'FR-03',n:'Laporan OPD',d:'CRUD laporan kinerja OPD dengan form dan tabel'},{id:'FR-04',n:'Integrasi Data',d:'Sinkronisasi data antar OPD secara real-time'},{id:'FR-05',n:'Notifikasi',d:'Sistem alert keterlambatan dan target tidak tercapai'},{id:'FR-06',n:'Export PDF',d:'Export laporan ke format PDF'},{id:'FR-07',n:'Audit Log',d:'Pencatatan seluruh aktivitas pengguna di sistem'}];var nr=[{id:'NFR-01',n:'Performance',d:'Loading time < 3 detik untuk setiap halaman'},{id:'NFR-02',n:'Availability',d:'Uptime sistem minimal 95%'},{id:'NFR-03',n:'Security',d:'Enkripsi data dan role-based access control'},{id:'NFR-04',n:'Scalability',d:'Mendukung penambahan OPD hingga 50 unit'},{id:'NFR-05',n:'Usability',d:'Antarmuka intuitif yang mudah digunakan pemda'}];var isF=A.reqTab==='func';var dt=isF?fr:nr;var h=tp2('Requirement Document')+'<div class="ct"><div class="tbs"><div class="tbi '+(A.reqTab==='func'?'on':'')+'" onclick="A.reqTab=\'func\';render()">Functional Requirements</div><div class="tbi '+(A.reqTab==='nonfunc'?'on':'')+'" onclick="A.reqTab=\'nonfunc\';render()">Non Functional Requirements</div></div><div class="cd ani" style="overflow-x:auto"><table class="tb2"><thead><tr><th>ID</th><th>Nama</th><th>Deskripsi</th></tr></thead><tbody>';for(var i=0;i<dt.length;i++){var r=dt[i];h+='<tr><td><span class="bg bgb">'+r.id+'</span></td><td style="font-weight:600">'+r.n+'</td><td style="color:var(--ts)">'+r.d+'</td></tr>';}h+='</tbody></table></div></div>';return h;}

// === PM APPROACH ===
function pgDkPM(){var ss=[{t:'PMBOK',i:'fa-book',c:'#1a6dd9',it:['Integration Management','Scope Management','Time Management','Risk Management','Stakeholder Management']},{t:'Scrum',i:'fa-sync-alt',c:'#0fcc8a',it:['Sprint Planning','Daily Scrum','Sprint Review','Sprint Retrospective']},{t:'Change Handling',i:'fa-exchange-alt',c:'#f0a828',it:['Product Backlog','Product Owner Approval','Sponsor Approval']}];var h=tp2('Project Management Approach')+'<div class="ct"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px">';for(var i=0;i<ss.length;i++){var s=ss[i];h+='<div class="cd ani" style="animation-delay:'+i*.08+'s;border-top:4px solid '+s.c+'"><h3 style="font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px"><i class="fas '+s.i+'" style="color:'+s.c+'"></i> '+s.t+'</h3><div style="display:flex;flex-direction:column;gap:7px">';for(var j=0;j<s.it.length;j++){h+='<div style="display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bs);border-radius:8px"><div style="width:7px;height:7px;border-radius:50%;background:'+s.c+'"></div><span style="font-size:12px">'+s.it[j]+'</span></div>';}h+='</div></div>';}h+='</div></div>';return h;}

// === SUCCESS CRITERIA ===
function pgDkSu(){var out=[{k:'100% fitur selesai',d:'Seluruh fitur dalam scope berhasil dikembangkan'},{k:'0 bug kritis',d:'Tidak ada bug dengan severity kritis saat go live'},{k:'UAT ≥ 95%',d:'User acceptance testing mencapai minimal 95%'},{k:'Dokumentasi lengkap',d:'Seluruh dokumentasi teknis dan user manual tersedia'},{k:'Deployment sukses',d:'Aplikasi berhasil di-deploy ke environment produksi'}];var otn=[{k:'80% OPD aktif',d:'Minimal 80% OPD menggunakan sistem secara aktif'},{k:'Waktu laporan turun 50%',d:'Waktu penyusunan laporan berkurang minimal 50%'},{k:'Kepuasan pengguna ≥ 85%',d:'Survei kepuasan pengguna mencapai minimal 85%'},{k:'Akses data ≤ 5 menit',d:'Data dapat diakses dalam waktu maksimal 5 menit'},{k:'Uptime ≥ 95%',d:'Ketersediaan sistem minimal 95% per bulan'}];var isO=A.sucTab==='out';var dt=isO?out:otn;var h=tp2('Success Criteria')+'<div class="ct"><div class="tbs"><div class="tbi '+(A.sucTab==='out'?'on':'')+'" onclick="A.sucTab=\'out\';render()">Output Success Criteria</div><div class="tbi '+(A.sucTab==='otn'?'on':'')+'" onclick="A.sucTab=\'otn\';render()">Outcome Success Criteria</div></div><div style="display:flex;flex-direction:column;gap:10px">';for(var i=0;i<dt.length;i++){h+='<div class="cd ani" style="animation-delay:'+i*.05+'s"><div style="display:flex;align-items:start;gap:10px"><div style="width:34px;height:34px;min-width:34px;border-radius:8px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff">'+(i+1)+'</div><div><div style="font-size:13px;font-weight:700">'+dt[i].k+'</div><div style="font-size:11px;color:var(--ts);margin-top:2px">'+dt[i].d+'</div></div></div></div>';}h+='</div></div>';return h;}

// === SETTINGS ===
function pgSt(){return tp2('Settings')+'<div class="ct"><div style="max-width:560px"><div class="cd ani" style="margin-bottom:14px"><h3 style="font-size:15px;font-weight:700;margin-bottom:14px"><i class="fas fa-user" style="color:var(--al);margin-right:7px"></i>Profil</h3><div style="display:grid;gap:10px"><div><label style="display:block;font-size:10px;font-weight:600;color:var(--ts);margin-bottom:4px">Nama</label><input class="frm" value="'+A.user.name+'"></div><div><label style="display:block;font-size:10px;font-weight:600;color:var(--ts);margin-bottom:4px">Role</label><input class="frm" value="'+A.user.role+'" disabled></div><button class="bt bp" onclick="toast(\'Profil berhasil diperbarui\',\'ok\')"><i class="fas fa-save"></i> Simpan Profil</button></div></div><div class="cd ani" style="animation-delay:.1s;margin-bottom:14px"><h3 style="font-size:15px;font-weight:700;margin-bottom:14px"><i class="fas fa-palette" style="color:var(--al);margin-right:7px"></i>Tampilan</h3><div class="fl"><button class="bt bs" onclick="toast(\'Mode gelap diaktifkan\',\'inf\')"><i class="fas fa-moon"></i> Dark Mode</button><button class="bt bs" onclick="toast(\'Mode terang diaktifkan\',\'inf\')"><i class="fas fa-sun"></i> Light Mode</button></div></div><div class="cd ani" style="animation-delay:.2s"><h3 style="font-size:15px;font-weight:700;margin-bottom:14px"><i class="fas fa-sign-out-alt" style="color:var(--dg);margin-right:7px"></i>Keluar</h3><p style="font-size:12px;color:var(--ts);margin-bottom:10px">Klik tombol di bawah untuk keluar dari sistem.</p><button class="bt bdg" onclick="A.auth=false;toast(\'Anda telah berhasil keluar\',\'inf\');go(\'login\')"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div></div>';}

// === RENDER ===
function render(){
var app=document.getElementById('app');
if(!A.auth&&A.page!=='login')A.page='login';
if(A.page==='login'){app.innerHTML=pgLogin();return;}
var c='';
switch(A.page){
case'dashboard':c=pgDash();break;case'detail-opd':c=pgDOPD();break;case'laporan':c=pgLap();break;case'integrasi':c=pgIg();break;case'notifikasi':c=pgNf();break;case'user-mgmt':c=pgUs();break;case'audit':c=pgAu();break;case'dok-proyek':c=pgDkP();break;case'dok-bisnis':c=pgDkB();break;case'dok-objektif':c=pgDkO();break;case'dok-scope':c=pgDkS();break;case'dok-release':c=pgDkR();break;case'timeline':c=pgTL();break;case'dok-budget':c=pgDkBu();break;case'risk':c=pgRk();break;case'dok-requirement':c=pgDkReq();break;case'dok-pm':c=pgDkPM();break;case'dok-success':c=pgDkSu();break;case'settings':c=pgSt();break;default:c=pgDash();break;
}
app.innerHTML='<div class="ly">'+sidebarH()+'<div class="mw '+(A.sb?'':'fl')+'">'+c+'</div></div>';
requestAnimationFrame(function(){if(A.page==='dashboard')iDash();if(A.page==='dok-budget')iBud();});
}
window.addEventListener('resize',function(){if(window.innerWidth>768&&!A.sb){A.sb=true;render();}});
render();
</script>
